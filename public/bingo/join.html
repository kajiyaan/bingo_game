<!doctype html>
<html lang="ja">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>ビンゴカード</title>
<style>
  :root{
    --bg:#0f1226; --bg2:#171a3a; --panel:#1e2350; --panel2:#262c66;
    --line:#3a4088; --text:#eef1ff; --muted:#9aa2d8;
    --accent:#ffd23f; --accent2:#ff5d8f; --hit:#38d39f; --free:#7b8cff;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic UI","Segoe UI",sans-serif;
    background:radial-gradient(900px 600px at 50% -10%,#242a63 0%,var(--bg) 55%);
    color:var(--text); min-height:100vh; padding:18px 14px 40px;
  }
  .wrap{max-width:460px; margin:0 auto}
  h1{text-align:center; font-size:20px; margin:6px 0 4px; letter-spacing:.08em}
  .sub{text-align:center; color:var(--muted); font-size:13px; margin-bottom:18px}

  .card{background:linear-gradient(180deg,var(--panel),var(--bg2)); border:1px solid var(--line);
        border-radius:18px; padding:20px; box-shadow:0 12px 40px rgba(0,0,0,.35)}
  input,button{font-family:inherit}
  input[type=text]{background:var(--bg2); color:var(--text); border:1px solid var(--line);
        border-radius:10px; padding:14px; font-size:17px; width:100%}
  button{cursor:pointer; border:none; border-radius:12px; padding:15px; font-size:17px; font-weight:800;
        color:#1a1030; width:100%; margin-top:14px;
        background:linear-gradient(180deg,#ffe27a,var(--accent)); box-shadow:0 6px 16px rgba(255,210,63,.3)}

  /* 参加フォーム */
  #join{max-width:400px; margin:6vh auto 0}
  #join .join-label{text-align:center; color:var(--muted); font-size:12px; letter-spacing:.1em; margin-bottom:4px}
  #join h2{margin:0 0 10px; font-size:24px; font-weight:900; text-align:center;
    background:linear-gradient(90deg,#ffd23f,#ff5d8f,#8b9bff);
    -webkit-background-clip:text; background-clip:text; color:transparent; word-break:break-word}
  #join .t{text-align:center; color:var(--muted); font-size:14px; margin-bottom:18px}

  /* カード画面 */
  #play{display:none}
  .status{text-align:center; font-weight:900; padding:12px; border-radius:14px; margin-bottom:14px;
          font-size:18px; letter-spacing:.05em; background:var(--bg2); border:1px solid var(--line); color:var(--muted)}
  .status.reach{color:#3a2b00; background:linear-gradient(90deg,#ffe27a,var(--accent)); border:none}
  .status.bingo{color:#04140f; background:linear-gradient(90deg,#38d39f,#7bffcf); border:none;
                font-size:26px; animation:flash .6s infinite alternate}
  @keyframes flash{from{box-shadow:0 0 0 rgba(56,211,159,0)}to{box-shadow:0 0 22px var(--hit)}}
  .status.hit{color:#3a2b00; background:linear-gradient(90deg,#ffe27a,var(--accent)); border:none}
  .status.miss{color:#cdd3ff; background:var(--panel2); border:1px solid var(--line)}
  .status.pop{animation:stpop .45s cubic-bezier(.2,1.6,.4,1)}
  @keyframes stpop{0%{transform:scale(.82)}60%{transform:scale(1.07)}100%{transform:scale(1)}}

  /* B/I/N/G/O 列ごとの色 */
  .c0{--col:#ff8fae} .c1{--col:#ffd23f} .c2{--col:#5eecc0} .c3{--col:#8b9bff} .c4{--col:#c78bff}

  .bingo-card{display:grid; grid-template-columns:repeat(5,1fr); gap:6px}
  .hcell{text-align:center; font-weight:900; font-size:22px; padding:8px 0; border-radius:10px;
         background:var(--col); color:#1a1030}
  .cell{aspect-ratio:1; display:flex; align-items:center; justify-content:center;
        background:var(--bg2); border:2px solid color-mix(in srgb, var(--col) 45%, transparent);
        border-radius:50%; color:var(--col);
        font-size:min(7vw,26px); font-weight:800; transition:.15s; position:relative;
        cursor:pointer; user-select:none; -webkit-tap-highlight-color:transparent}
  .cell.called{border:3px solid #ff2222; animation:hint .9s infinite alternate}
  @keyframes hint{
    from{box-shadow:0 0 4px 1px rgba(255,34,34,.6), inset 0 0 4px rgba(255,34,34,.4)}
    to{box-shadow:0 0 16px 4px rgba(255,34,34,.95), inset 0 0 10px rgba(255,34,34,.6)}
  }
  .cell.marked{background:var(--col); color:#1a1030; border-color:var(--col); animation:none}
  .cell.marked::after{content:"●"; position:absolute; font-size:min(14vw,54px); color:rgba(26,16,48,.15); font-weight:900}
  .cell.free{background:var(--free); border-color:var(--free); color:#fff; font-size:14px}
  .cell.free.marked::after{content:"★"; color:rgba(255,255,255,.4)}
  .cell.win{animation:cellflash .8s infinite alternate}
  @keyframes cellflash{from{box-shadow:0 0 0 rgba(56,211,159,0)}to{box-shadow:0 0 16px var(--hit)}}

  .foot{text-align:center; color:var(--muted); font-size:12px; margin-top:16px; line-height:1.7}
  .err{color:var(--accent2); text-align:center; margin-top:12px; font-size:14px}

  /* 抽選番号一覧 */
  .called-box{background:linear-gradient(180deg,var(--panel),var(--bg2)); border:1px solid var(--line);
        border-radius:18px; padding:14px 16px; margin-top:14px}
  .called-box h3{margin:0 0 10px; font-size:13px; color:var(--muted); letter-spacing:.08em; text-align:center}
  .chips{display:flex; flex-wrap:wrap; gap:5px; justify-content:center}
  .chip{width:30px; height:30px; border-radius:50%; background:var(--col,var(--panel2)); color:#1a1030;
        display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700}
  .chip.latest{box-shadow:0 0 12px var(--col); border:2px solid #fff}
  .chip.mine{border:2px solid rgba(255,255,255,.55)}
  .chip.latest.mine{border:2px solid #fff}
  .no-called{color:var(--muted); font-size:13px; text-align:center; padding:6px}
</style>

<div class="wrap">
  <!-- 参加フォーム -->
  <div id="join">
    <h1>🎯 ビンゴに参加</h1>
    <div class="card">
      <div class="join-label">参加する大会</div>
      <h2 id="joinTName">読み込み中…</h2>
      <div class="t">お名前を入れて参加してください</div>
      <input type="text" id="pname" placeholder="お名前（ニックネームでもOK）" maxlength="20" autofocus>
      <button id="joinBtn">カードをもらう</button>
      <div class="err" id="joinErr"></div>
    </div>
  </div>

  <!-- カード -->
  <div id="play">
    <h1 id="playTName">ビンゴ</h1>
    <div class="sub"><span id="playName"></span> さんのカード</div>
    <div class="status" id="status">抽選を待っています…</div>
    <div class="card">
      <div class="bingo-card" id="bcard"></div>
    </div>
    <div class="foot">
      光っているマスが出た数字です。<b>タッチして開けよう！</b>
    </div>
    <div class="called-box">
      <h3>出た数字（<span id="calledCount">0</span> 個）</h3>
      <div class="chips" id="calledChips"><div class="no-called">まだ数字は出ていません</div></div>
    </div>
  </div>
</div>

<script>
const $ = (id)=>document.getElementById(id);
const LETTERS = ["B","I","N","G","O"];
const params = new URLSearchParams(location.search);
const tid = params.get("t");
let pid = null;
let card = null;

// 同じ端末で再読込しても同じカードを保つ
const storeKey = "bingo_"+tid;

async function init(){
  if(!tid){ $("joinErr").textContent = "URLが正しくありません。QRを読み直してください。"; return; }
  const saved = localStorage.getItem(storeKey);
  if(saved){
    try{
      const o = JSON.parse(saved);
      pid = o.pid; card = o.card;
      // 有効性チェック
      const r = await fetch("/api/bingo/player?t="+tid+"&p="+pid);
      if(r.ok){ startPlay(o.tName, o.name); return; }
      localStorage.removeItem(storeKey);
    }catch(e){ localStorage.removeItem(storeKey); }
  }
  // 参加フォーム：大会名を表示
  try{
    const r = await fetch("/api/room-info?t="+tid);
    if(r.ok){
      const d = await r.json();
      $("joinTName").textContent = d.name;
      document.title = d.name + " — ビンゴ参加";
    } else {
      $("joinTName").textContent = "大会が見つかりません";
      $("joinErr").textContent = "QRを読み直してください。";
    }
  }catch(e){ $("joinTName").textContent = "大会に参加"; }
}

async function join(){
  $("joinErr").textContent = "";
  const name = $("pname").value.trim();
  const r = await fetch("/api/rooms/join", {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({tid, name})
  });
  const d = await r.json();
  if(!r.ok){ $("joinErr").textContent = d.error || "参加できませんでした"; return; }
  pid = d.pid; card = d.card;
  localStorage.setItem(storeKey, JSON.stringify({pid, card, tName:d.tName, name:d.name}));
  startPlay(d.tName, d.name);
}

function startPlay(tName, name){
  $("join").style.display = "none";
  $("play").style.display = "block";
  $("playTName").textContent = tName || "ビンゴ";
  $("playName").textContent = name || "ゲスト";
  buildCard();
  poll();
  setInterval(poll, 1500);
}

function buildCard(){
  const el = $("bcard");
  el.innerHTML = "";
  LETTERS.forEach((L,i)=>{
    const h=document.createElement("div"); h.className="hcell c"+i; h.textContent=L; el.appendChild(h);
  });
  for(let r=0;r<5;r++){
    for(let c=0;c<5;c++){
      const cell=document.createElement("div");
      cell.id = "cell-"+r+"-"+c;
      if(r===2 && c===2){ cell.className="cell free marked"; cell.textContent="FREE"; }
      else{
        cell.className="cell c"+c; cell.textContent = card[c][r];
        cell.addEventListener("click", ()=>tapCell(r,c));
      }
      el.appendChild(cell);
    }
  }
}

// 状態（playing / reach / bingo）
let curState = "playing";

// 音声 — タップ操作の流れで呼ばれるためモバイルでも再生可
function speak(text, opts){
  try{
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "ja-JP";
    u.rate = (opts && opts.rate) || 1.05;
    u.pitch = (opts && opts.pitch) || 1.3;
    u.volume = 1;
    speechSynthesis.speak(u);
  }catch(e){ /* 非対応端末では無音のまま */ }
}

// 紙吹雪
function confetti(durationMs){
  const cv = document.createElement("canvas");
  cv.style.cssText = "position:fixed;inset:0;width:100vw;height:100vh;pointer-events:none;z-index:9999";
  document.body.appendChild(cv);
  const dpr = window.devicePixelRatio || 1;
  const W = cv.width = innerWidth * dpr, H = cv.height = innerHeight * dpr;
  const ctx = cv.getContext("2d");
  const colors = ["#ff5d8f","#ffd23f","#5eecc0","#8b9bff","#c78bff","#ff8f6d","#ffffff"];
  const P = [];
  for(let i=0;i<160;i++){
    P.push({
      x: Math.random()*W, y: -Math.random()*H*0.6 - 20,
      w: (6+Math.random()*7)*dpr, h: (10+Math.random()*10)*dpr,
      c: colors[i % colors.length],
      vy: (2.2+Math.random()*3)*dpr, vx: (Math.random()-0.5)*2*dpr,
      rot: Math.random()*Math.PI, vr: (Math.random()-0.5)*0.25,
      sway: Math.random()*Math.PI*2
    });
  }
  const t0 = performance.now();
  (function frame(now){
    const t = now - t0;
    ctx.clearRect(0,0,W,H);
    for(const p of P){
      p.y += p.vy;
      p.x += p.vx + Math.sin(t/300 + p.sway) * dpr;
      p.rot += p.vr;
      if(p.y > H + 20 && t < durationMs - 1800) p.y = -20; // 終盤までは上から降り続ける
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot);
      ctx.fillStyle = p.c;
      // ひらひら感（横幅を周期的に変える）
      ctx.fillRect(-p.w/2 * Math.abs(Math.sin(t/200 + p.sway)), -p.h/2, p.w * Math.abs(Math.sin(t/200 + p.sway)) || 1, p.h);
      ctx.restore();
    }
    if(t < durationMs) requestAnimationFrame(frame);
    else cv.remove();
  })(t0);
}

// ビンゴのお祝い（音声＋紙吹雪＋バイブ）
function celebrateBingo(){
  speak("ビンゴー！！", {rate: 0.95, pitch: 1.5});
  confetti(5000);
  if(navigator.vibrate) navigator.vibrate([100,50,100,50,400]);
}

async function tapCell(r,c){
  const prev = curState;
  const res = await fetch("/api/bingo/mark", {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({tid, pid, r, c})
  });
  const d = await res.json();
  if(!res.ok) return; // まだ出ていない数字などは無視
  applyState(d.marked, lastCalled, d);
  // 状態が上がった瞬間だけ演出
  if(curState === "bingo" && prev !== "bingo"){
    celebrateBingo();
  } else if(curState === "reach" && prev === "playing"){
    speak("リーチっ！");
    if(navigator.vibrate) navigator.vibrate(200);
  }
}

let lastCalled = [];
let prevCalledLen = -1;   // 初回ポーリングでは盛り上げコメントを出さない
let commentTimer = null;

// 盛り上げコメント（自分のカードに出た＝ヒット / 出なかった＝ハズレ）
const HIT_COMMENTS = [
  "キターッ！","あなたの番号だ！","ラッキー！🍀","きたきた！","いいね！👍","その調子！",
  "ナイス！","おっ！来た！","当たった！","マークしよ！","ツいてる！✨","最高！",
  "やったね！","のってきた！","もうちょい！","おしい…！","ビンゴ近いかも！？","攻めてる！",
  "絶好調！🔥","運を持ってる！","スーパーラッキー！","うれしい〜！","ここで来るか！","流れ来てる！"
];
const MISS_COMMENTS = [
  "ざんねん！","次こそ！","うーん…おしい","まだまだこれから！","どんまい！","次に期待！🙏",
  "むむ…","ここからここから！","のこりに賭けろ！","次はくるはず！","気を落とさず！","まだいける！",
  "ドキドキ…","おしくない！？","運はためてる！","次の一手に期待！","へこたれない！💪","まだ諦めない！"
];
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

async function poll(){
  const r = await fetch("/api/bingo/player?t="+tid+"&p="+pid);
  if(!r.ok) return;
  const d = await r.json();
  lastCalled = d.called;
  applyState(d.marked, d.called, d);
}

function applyState(marked, calledArr, d){
  const oldState = curState;
  curState = d.bingo ? "bingo" : d.reach ? "reach" : "playing";
  const calledSet = new Set(calledArr);
  const myNums = new Set();
  for(let c=0;c<5;c++) for(let r=0;r<5;r++) myNums.add(card[c][r]);

  // マスの状態：marked ＞ called（ヒント）＞ 通常
  for(let r2=0;r2<5;r2++){
    for(let c=0;c<5;c++){
      if(r2===2 && c===2) continue;
      const cell = $("cell-"+r2+"-"+c);
      const num = card[c][r2];
      cell.classList.toggle("marked", !!marked[r2][c]);
      cell.classList.toggle("called", !marked[r2][c] && calledSet.has(num));
    }
  }

  // 出た数字一覧（小さい順・最新を強調・自分のカードにある数字は枠付き）
  $("calledCount").textContent = calledArr.length;
  const box = $("calledChips");
  if(calledArr.length === 0){
    box.innerHTML = '<div class="no-called">まだ数字は出ていません</div>';
  } else {
    const latest = calledArr[calledArr.length-1];
    box.innerHTML = "";
    [...calledArr].sort((a,b)=>a-b).forEach(n=>{
      const chip = document.createElement("div");
      chip.className = "chip c" + Math.floor((n-1)/15) + (n===latest?" latest":"") + (myNums.has(n)?" mine":"");
      chip.textContent = n;
      box.appendChild(chip);
    });
  }

  // 勝ちラインを光らせる
  document.querySelectorAll(".cell.win").forEach(e=>e.classList.remove("win"));
  const st = $("status");
  const grew = calledArr.length > prevCalledLen && prevCalledLen >= 0; // 新しい番号が公開された
  if(d.bingo){
    st.className="status bingo";
    st.textContent = d.rank ? "🎉 BINGO！ "+d.rank+"位！ 🎉" : "🎉 BINGO！ 🎉";
    markWinLines(marked);
  } else if(d.reach){
    st.className="status reach";
    st.textContent = "リーチ！ あと1つ（"+d.reachLines+"ライン）";
  } else if(grew){
    // 新しい番号が出た瞬間だけ、状況に応じた盛り上げコメント
    const latest = calledArr[calledArr.length-1];
    const hit = myNums.has(latest);
    st.className = "status " + (hit ? "hit" : "miss") + " pop";
    st.textContent = hit ? (latest + "！ " + pick(HIT_COMMENTS)) : pick(MISS_COMMENTS);
    void st.offsetWidth; // アニメ再起動
    clearTimeout(commentTimer);
    commentTimer = setTimeout(()=>{
      if(curState === "playing"){ st.className="status"; st.textContent="そろえよう！"; }
    }, 4000);
  } else if(prevCalledLen < 0 || oldState !== "playing"){
    // 初回表示、またはリーチ/ビンゴから戻ってきたとき（コメントは出さない）
    st.className="status";
    st.textContent = calledArr.length ? "そろえよう！" : "抽選を待っています…";
  }
  // それ以外（番号が増えていない通常のポーリング）は現在の表示を維持
  prevCalledLen = calledArr.length;
}

function markWinLines(m){
  const lines=[];
  for(let r=0;r<5;r++) lines.push([0,1,2,3,4].map(c=>[r,c]));
  for(let c=0;c<5;c++) lines.push([0,1,2,3,4].map(r=>[r,c]));
  lines.push([0,1,2,3,4].map(i=>[i,i]));
  lines.push([0,1,2,3,4].map(i=>[i,4-i]));
  lines.forEach(line=>{
    if(line.every(([r,c])=>m[r][c])) line.forEach(([r,c])=>$("cell-"+r+"-"+c).classList.add("win"));
  });
}

$("joinBtn").addEventListener("click", join);
$("pname").addEventListener("keydown", e=>{ if(e.key==="Enter") join(); });
init();
</script>
</html>
